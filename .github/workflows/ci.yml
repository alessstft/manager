name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check unapplied model changes
        run: python tasks/manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python tasks/manage.py test new users

      - name: Build release artifact
        run: |
          git archive --format=zip --output=release-artifact.zip HEAD

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: release-artifact.zip
