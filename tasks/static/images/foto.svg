    <rect x="450" y="330" width="310" height="150" rx="16" fill="#f7f9fc"/>
    <rect x="140" y="505" width="620" height="130" rx="16" fill="#f7f9fc"/>
  </g>

  <g>
    <rect x="168" y="360" width="18" height="90" rx="8" fill="#6aa7ff"/>
    <rect x="196" y="388" width="18" height="62" rx="8" fill="#7ec1ff"/>
    <rect x="224" y="344" width="18" height="106" rx="8" fill="#4f8fff"/>
    <rect x="252" y="374" width="18" height="76" rx="8" fill="#96d5ff"/>
    <path d="M294 426h96" stroke="#ccd3e2" stroke-width="10" stroke-linecap="round"/>
    <path d="M294 452h72" stroke="#d7ddec" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="490" cy="376" r="16" fill="#4f8fff"/>
