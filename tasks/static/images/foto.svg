    <circle cx="694" cy="376" r="16" fill="#7ec1ff"/>
    <path d="M490 416h204" stroke="#d6dceb" stroke-width="10" stroke-linecap="round"/>
    <path d="M490 442h146" stroke="#e1e6f2" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="168" y="540" width="190" height="18" rx="9" fill="#bcc5d8"/>
    <rect x="168" y="572" width="150" height="14" rx="7" fill="#d6dcec"/>
    <rect x="404" y="540" width="328" height="18" rx="9" fill="#bcc5d8"/>
