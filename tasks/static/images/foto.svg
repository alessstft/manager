<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-label="Управление бизнесом">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3e2e47"/>
      <stop offset="50%" stop-color="#6a4f63"/>
      <stop offset="100%" stop-color="#9b786f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f2f4f8" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8fff"/>
      <stop offset="100%" stop-color="#63d2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f1326" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="210" fill="#ffffff" opacity="0.07"/>
  <circle cx="180" cy="650" r="280" fill="#ffffff" opacity="0.05"/>

  <text x="90" y="108" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">
    Управление бизнесом
  </text>
  <text x="90" y="150" fill="#f5eaf1" font-family="Segoe UI, Arial, sans-serif" font-size="26" opacity="0.95">
    Планируйте проекты, задачи и команду в одном месте
  </text>

  <g filter="url(#shadow)">
    <rect x="90" y="210" width="720" height="460" rx="26" fill="url(#card)"/>
  </g>

  <rect x="120" y="250" width="660" height="52" rx="14" fill="#eef1f7"/>
  <rect x="140" y="268" width="220" height="16" rx="8" fill="#9ea7bb"/>
  <rect x="610" y="264" width="140" height="24" rx="12" fill="url(#accent)"/>

  <g>
