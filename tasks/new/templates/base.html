{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Noda{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS  –  единый источник правды для всего сайта
    ═══════════════════════════════════════════════════════════ */
    :root {
      --primary:        #5b3d8c;
      --primary-dark:   #3e2665;
      --primary-light:  #7c5ab8;
      --primary-faint:  rgba(91,61,140,.08);
      --accent:         #f5a623;
      --danger:         #ef4444;
      --danger-faint:   rgba(239,68,68,.1);
      --warning:        #f59e0b;
      --warning-faint:  rgba(245,158,11,.12);
      --success:        #22c55e;
      --success-faint:  rgba(34,197,94,.1);
      --info:           #3b82f6;
      --info-faint:     rgba(59,130,246,.1);
      --bg:             #f7f6fb;
      --surface:        #ffffff;
      --text-primary:   #1a1329;
      --text-secondary: #5a5470;
      --text-muted:     #9b95b0;
      --border:         #e4dfef;
      --shadow-sm:      0 1px 3px rgba(91,61,140,.08);
      --shadow-md:      0 4px 16px rgba(91,61,140,.12);
      --shadow-lg:      0 12px 40px rgba(91,61,140,.18);
      --radius-sm:      8px;
      --radius:         12px;
      --radius-lg:      16px;
      --radius-xl:      24px;
      --transition:     0.22s cubic-bezier(.4,0,.2,1);
      --header-h:       64px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ─── HEADER ───────────────────────────────────────────── */
    .main-header {
      position: fixed; top:0; left:0; right:0; z-index:1000;
      height: var(--header-h);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px; margin:0 auto; padding:0 24px;
      height:100%; display:flex; align-items:center; justify-content:space-between; gap:24px;
    }
    .logo {
      font-size:1.15rem; font-weight:800; color:var(--primary);
      text-decoration:none; display:flex; align-items:center; gap:8px;
      letter-spacing:-.3px; flex-shrink:0;
    }
    .logo i { color:var(--accent); font-size:1rem; }

    .main-nav { display:flex; gap:2px; }
    .main-nav a {
      text-decoration:none; color:var(--text-secondary); font-weight:500;
      font-size:.875rem; padding:7px 13px; border-radius:var(--radius-sm);
      transition: color var(--transition), background var(--transition);
      display:flex; align-items:center; gap:6px;
    }
    .main-nav a:hover { color:var(--primary); background:var(--primary-faint); }
    .main-nav a.active { color:var(--primary); background:var(--primary-faint); font-weight:600; }

    .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

    /* ─── USER DROPDOWN ───────────────────────────────────── */
    .user-menu { position:relative; }
    .user-trigger {
      display:flex; align-items:center; gap:8px;
      padding:5px 12px 5px 5px; border-radius:100px;
      border:1.5px solid var(--border); background:var(--surface);
      cursor:pointer; font-size:.875rem; font-weight:500; color:var(--text-primary);
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
    }
    .user-trigger:hover { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-faint); }
    .user-avatar { width:30px; height:30px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
    .user-trigger .chevron { font-size:.65rem; color:var(--text-muted); margin-left:2px; transition: transform var(--transition); }
    .user-menu.open .chevron { transform: rotate(180deg); }

    .hdr-dropdown {
      position:absolute; top:calc(100% + 8px); right:0;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow-lg);
      min-width:200px; padding:6px; z-index:999; display:none;
    }
    .user-menu.open .hdr-dropdown { display:block; animation:fadeInDown .15s ease; }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

    .hdr-dropdown-item {
      display:flex; align-items:center; gap:10px; padding:9px 12px;
      border-radius:var(--radius-sm); font-size:.875rem; color:var(--text-primary);
      text-decoration:none; cursor:pointer; border:none; background:none;
      width:100%; text-align:left; font-family:inherit;
      transition: background var(--transition), color var(--transition);
    }
    .hdr-dropdown-item:hover { background:var(--primary-faint); color:var(--primary); }
    .hdr-dropdown-item i { width:14px; color:var(--text-muted); flex-shrink:0; }
    .hdr-dropdown-item:hover i { color:var(--primary); }
    .hdr-dropdown-divider { height:1px; background:var(--border); margin:6px 0; }
    .hdr-dropdown-item.danger { color:var(--danger); }
    .hdr-dropdown-item.danger:hover { background:var(--danger-faint); }
    .hdr-dropdown-item.danger i { color:var(--danger); }

    /* ─── PAGE WRAPPER ────────────────────────────────────── */
    .page-content {
      max-width: 1280px; margin:0 auto;
      padding: calc(var(--header-h) + 32px) 24px 56px;
    }

    /* ─── ALERTS ──────────────────────────────────────────── */
    .alert {
      display:flex; align-items:flex-start; gap:10px;
      padding:12px 16px; border-radius:var(--radius-sm);
      font-size:.875rem; margin-bottom:12px;
    }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
    .alert-error, .alert-danger { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
    .alert-info { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
    .alert-warning { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
    .alert-close { margin-left:auto; cursor:pointer; opacity:.5; background:none; border:none; font-size:1rem; color:inherit; transition:opacity var(--transition); padding:0; }
    .alert-close:hover { opacity:1; }

    /* ─── BUTTONS ─────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:9px 18px; border-radius:var(--radius-sm); font-family:inherit;
      font-size:.875rem; font-weight:600; line-height:1.2;
      cursor:pointer; border:none; text-decoration:none; white-space:nowrap;
      transition: all var(--transition);
    }
    .btn-primary { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(91,61,140,.3); }
    .btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:0 4px 16px rgba(91,61,140,.4); }
    .btn-primary:active { transform:none; }
    .btn-ghost { background:transparent; color:var(--text-secondary); border:1.5px solid var(--border); }
    .btn-ghost:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-faint); }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-danger:hover { background:#dc2626; transform:translateY(-1px); }
    .btn-danger-ghost { background:transparent; color:var(--danger); border:1.5px solid rgba(239,68,68,.3); }
    .btn-danger-ghost:hover { background:var(--danger-faint); border-color:var(--danger); }
    .btn-sm { padding:6px 12px; font-size:.8rem; }
    .btn-lg { padding:12px 28px; font-size:1rem; }
    .btn-w100 { width:100%; }

    /* ─── FORM ELEMENTS ───────────────────────────────────── */
    .form-group { margin-bottom:16px; }
    .form-label { font-size:.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:6px; display:block; }
    .form-label .req { color:var(--danger); margin-left:2px; }
    .form-control, .form-select {
      width:100%; padding:9px 12px; border:1.5px solid var(--border);
      border-radius:var(--radius-sm); font-family:inherit; font-size:.875rem;
      color:var(--text-primary); background:var(--bg); outline:none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .form-control:focus, .form-select:focus {
      border-color:var(--primary); background:var(--surface);
      box-shadow:0 0 0 3px var(--primary-faint);
    }
    textarea.form-control { resize:vertical; min-height:80px; }
    .form-hint { font-size:.75rem; color:var(--text-muted); margin-top:4px; }
    .form-error { font-size:.78rem; color:var(--danger); margin-top:4px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* ─── MODAL ───────────────────────────────────────────── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(20,10,40,.45);
      backdrop-filter:blur(4px); z-index:2000;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open { display:flex; animation:fadeInDown .2s ease; }
    .modal-box {
      background:var(--surface); border-radius:var(--radius-lg);
      width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
      box-shadow:var(--shadow-lg); animation:slideUp .25s ease;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 24px 0; margin-bottom:20px;
    }
    .modal-title { font-size:1.05rem; font-weight:700; color:var(--text-primary); }
    .modal-close {
      width:32px; height:32px; border-radius:var(--radius-sm); border:none;
      background:none; cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:var(--text-muted); font-size:1rem;
      transition: background var(--transition), color var(--transition);
    }
    .modal-close:hover { background:var(--bg); color:var(--text-primary); }
    .modal-body { padding:0 24px 20px; }
    .modal-footer {
      display:flex; justify-content:flex-end; gap:8px;
      padding:16px 24px; border-top:1px solid var(--border);
      background:var(--bg); border-radius:0 0 var(--radius-lg) var(--radius-lg);
    }

    /* ─── BADGES ──────────────────────────────────────────── */
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 9px; border-radius:100px; font-size:.72rem; font-weight:700;
    }
    .badge-high { background:var(--danger-faint); color:var(--danger); }
    .badge-medium { background:var(--warning-faint); color:#92400e; }
    .badge-low { background:var(--success-faint); color:#166534; }
    .badge-todo { background:rgba(107,114,128,.1); color:#374151; }
    .badge-in_progress { background:var(--info-faint); color:#1e40af; }
    .badge-review { background:var(--warning-faint); color:#92400e; }
    .badge-done { background:var(--success-faint); color:#166534; }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width:900px) {
      .main-nav { display:none; }
      .page-content { padding-left:16px; padding-right:16px; }
    }
    @media (max-width:600px) {
      .form-row { grid-template-columns:1fr; }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

  <header class="main-header">
    <div class="header-inner">
      <a href="{% url 'index' %}" class="logo">
        <i class="fas fa-layer-group"></i>Noda
      </a>
      <nav class="main-nav">
        <a href="{% url 'index' %}" {% if request.resolver_match.url_name == 'index' or request.resolver_match.url_name == 'home' %}class="active"{% endif %}>
          <i class="fas fa-home"></i>Главная
        </a>
        <a href="{% url 'projects' %}" {% if request.resolver_match.url_name == 'projects' %}class="active"{% endif %}>
          <i class="fas fa-folder"></i>Проекты
        </a>
        <a href="{% url 'tasks' %}" {% if request.resolver_match.url_name == 'tasks' or request.resolver_match.url_name == 'task_detail' %}class="active"{% endif %}>
          <i class="fas fa-check-square"></i>Задачи
        </a>
        <a href="{% url 'workload' %}" {% if request.resolver_match.url_name == 'workload' %}class="active"{% endif %}>
          <i class="fas fa-chart-bar"></i>Нагрузка
        </a>
      </nav>
      <div class="header-right">
        <div class="user-menu" id="userMenu">
          <button class="user-trigger" onclick="toggleUserMenu()">
            {% if user.profile.image %}
              <img src="{{ user.profile.image.url }}" alt="" class="user-avatar" />
            {% else %}
              <img src="https://ui-avatars.com/api/?name={{ user.profile.display_name|urlencode }}&size=64&background=5b3d8c&color=fff" alt="" class="user-avatar" />
            {% endif %}
            <span>{{ user.profile.display_name }}</span>
            <i class="fas fa-chevron-down chevron"></i>
          </button>
          <div class="hdr-dropdown">
            <a href="{% url 'profile' %}" class="hdr-dropdown-item"><i class="fas fa-user"></i>Профиль</a>
            {% if is_admin %}
            <a href="{% url 'admin_create_employee' %}" class="hdr-dropdown-item"><i class="fas fa-user-plus"></i>Новый сотрудник</a>
            {% endif %}
            <div class="hdr-dropdown-divider"></div>
            <form action="{% url 'logout' %}" method="post">{% csrf_token %}
              <button type="submit" class="hdr-dropdown-item danger"><i class="fas fa-sign-out-alt"></i>Выход</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="page-content">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">
        <i class="fas fa-{% if 'success' in message.tags %}check-circle{% elif 'error' in message.tags or 'danger' in message.tags %}exclamation-circle{% elif 'warning' in message.tags %}exclamation-triangle{% else %}info-circle{% endif %}"></i>
        <span>{{ message }}</span>
        <button class="alert-close" onclick="this.parentElement.remove()">&#x2715;</button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script>
    function toggleUserMenu() {
      document.getElementById('userMenu').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const m = document.getElementById('userMenu');
      if (m && !m.contains(e.target)) m.classList.remove('open');
    });
    function openModal(id) {
      const el = document.getElementById(id);
      if (el) { el.classList.add('open'); document.body.style.overflow = 'hidden'; }
    }
    function closeModal(id) {
      const el = document.getElementById(id);
      if (el) { el.classList.remove('open'); document.body.style.overflow = ''; }
    }
    function closeOnOverlay(e, id) {
      if (e.target === e.currentTarget) closeModal(id);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => {
          m.classList.remove('open'); document.body.style.overflow = '';
        });
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
